name: Bug report
description: Report something that isn't working
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.
  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: What did you expect to happen instead?
      placeholder: "Describe the bug..."
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Python version, and any relevant details.
      placeholder: |
        - OS:
        - Python:
        - Git SHA:
    validations:
      required: false

