experiment:
  name: momentum_baseline
  description: Homogeneous momentum population — baseline for crowding and convergence analysis
  seed: 42

venue:
  type: equity
  params:
    n_steps: 500
    n_assets: 10
    base_volatility: 0.01
    temporary_impact: 0.1
    permanent_impact: 0.01

agents:
  - type: momentum
    count: 10
    params:
      lookback: 21

recording:
  type: jsonl
  params:
    output_dir: results/

evaluation:
  metrics:
    - annualized_vol
    - sharpe_ratio
    - max_drawdown
    - sortino_ratio
